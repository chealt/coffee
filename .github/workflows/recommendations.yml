name: Recommendations
on:
  schedule:
    - cron: '0 0 * * 0'
permissions:
  contents: write
jobs:
  recommendations:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v6
        with:
          node-version-file: 'package.json'
          cache: 'yarn'
      - name: Install dependencies
        run: yarn install --immutable
      - name: Refresh recommendations
        env:
          TURSO_API_TOKEN: ${{ secrets.TURSO_API_TOKEN }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
        run: yarn workspace @chealt/coffee recommendations:ci
      - name: Commit changes
        continue-on-error: true
        run: |
          git config --global user.name 'Chealt GitHub automation'
          git config --global user.email 'info@centralbeans.com'
          git commit -am "Added new recommendations"
          git push
