name: Deploy
on:
  push:
    branches:
      - main
permissions:
  contents: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v6
        with:
          node-version-file: 'package.json'
          cache: 'yarn'
      - name: Install dependencies
        run: yarn install --immutable
      - name: Check changed files
        id: changed-files-yaml
        uses: tj-actions/changed-files@v47
        with:
          files_yaml: |
            coffee-admin:
              - packages/coffee-admin/package.json
              - packages/coffee-admin/index.js
              - packages/coffee-admin/.yarnrc-lambda.yml
              - packages/coffee-admin/src/**
              - packages/coffee.chealt.com/data/roasters.json
            webshop-processor:
              - packages/webshop-processor/package.json
              - packages/webshop-processor/.yarnrc-lambda.yml
              - packages/webshop-processor/src/**
            webshop-item-processor:
              - packages/coffee.chealt.com/data/**
              - packages/webshop-item-processor/package.json
              - packages/webshop-item-processor/.yarnrc-lambda.yml
              - packages/webshop-item-processor/src/**
      - name: coffee-admin
        if: steps.changed-files-yaml.outputs.coffee-admin_any_changed == 'true'
        run: |
          yarn workspace @chealt/coffee-admin build
          yarn workspace @chealt/coffee-admin deploy
      - name: webshop-processor
        if: steps.changed-files-yaml.outputs.webshop-processor_any_changed == 'true'
        run: |
          yarn workspace @chealt/webshop-processor build
          yarn workspace @chealt/webshop-processor deploy
      - name: webshop-item-processor
        if: steps.changed-files-yaml.outputs.webshop-item-processor_any_changed == 'true'
        run: |
          yarn workspace @chealt/webshop-item-processor build
          yarn workspace @chealt/webshop-item-processor deploy
