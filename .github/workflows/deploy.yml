  screenshot-lambda:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check changed files
        id: changed-files
        uses: tj-actions/changed-files@v47
        with:
          files: |
            yarn.lock
            .github/workflows/deploy.yml
            packages/screenshot-lambda/**
      - uses: aws-actions/configure-aws-credentials@v6
        if: steps.changed-files.outputs.any_changed == 'true'
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}
      - name: Login to ECR
        if: steps.changed-files.outputs.any_changed == 'true'
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      - name: Set up Docker Buildx
        if: steps.changed-files.outputs.any_changed == 'true'
        uses: docker/setup-buildx-action@v3
      - name: Get Git Hash
        if: steps.changed-files.outputs.any_changed == 'true'
        id: git-hash
        run: echo "hash=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
      - name: Build and Push
        if: steps.changed-files.outputs.any_changed == 'true'
        uses: docker/build-push-action@v6
        with:
          context: packages/screenshot-lambda
          push: true
          tags: ${{ steps.login-ecr.outputs.registry }}/centralbeans/screenshot-lambda:${{ steps.git-hash.outputs.hash }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false
      - name: Deploy
        if: steps.changed-files.outputs.any_changed == 'true'
        uses: aws-actions/aws-cloudformation-github-deploy@v2
        with:
          name: screenshot-lambda
          template: packages/screenshot-lambda/infra/template.yaml
          capabilities: CAPABILITY_IAM
          parameter-overrides: ImageUri=${{ steps.login-ecr.outputs.registry }}/centralbeans/screenshot-lambda:${{ steps.git-hash.outputs.hash }}
      - name: Publish Lambda Version
        if: steps.changed-files.outputs.any_changed == 'true'
        id: publish-version
        run: |
          version=$(aws lambda publish-version --function-name createWebsiteScreenshot | jq -r '.Version')
          echo "version=$version" >> $GITHUB_OUTPUT
      - name: Release screenshot-lambda
        if: steps.changed-files.outputs.any_changed == 'true' && steps.publish-version.conclusion == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
