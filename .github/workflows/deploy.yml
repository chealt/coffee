  website:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check changed files
        id: changed-files
        uses: tj-actions/changed-files@v47
        with:
          files: |
            yarn.lock
            .github/workflows/deploy.yml
            packages/coffee.chealt.com/*.js
            packages/coffee.chealt.com/*.json
            packages/coffee.chealt.com/data/**
            packages/coffee.chealt.com/public/**
            packages/coffee.chealt.com/src/**
      - uses: aws-actions/configure-aws-credentials@v6
        if: steps.changed-files.outputs.any_changed == 'true'
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}
      - uses: actions/setup-node@v6
        if: steps.changed-files.outputs.any_changed == 'true'
        with:
          node-version-file: 'package.json'
          cache: 'yarn'
      - name: build
        id: build
        if: steps.changed-files.outputs.any_changed == 'true'
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: |
          yarn install --immutable
          NODE_ENV=production yarn workspace @centralbeans/website build
          version=$(git rev-parse --short HEAD)
          echo "version=$version" >> $GITHUB_OUTPUT
      - name: deploy
        id: deploy
        if: steps.changed-files.outputs.any_changed == 'true' && steps.build.conclusion == 'success'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          command: deploy --config packages/coffee.chealt.com/wrangler.toml
      - name: Release centralbeans.com
        if: steps.changed-files.outputs.any_changed == 'true' && steps.deploy.conclusion == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create '@centralbeans/website@${{ steps.build.outputs.version }}' \
            --title "Release @centralbeans/website v${{ steps.build.outputs.version }}" \
            --notes "Automated release" \
            --draft=false \
            --prerelease=false
  website-test:
    runs-on: ubuntu-latest
    needs: website
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: 'package.json'
          cache: 'yarn'
      - name: Install dependencies
        run: yarn install --immutable
      - name: Get Playwright version
        id: playwright_version
        working-directory: packages/coffee.chealt.com
        shell: bash
        run: |
          version=$(yarn info @playwright/test --json | jq -r '.children.Version')
          echo "version=$version" >> $GITHUB_OUTPUT
      - uses: actions/cache@v5
        name: Get Playwright from cache
        id: cache
        with:
          path: |
            ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-chromium-${{ steps.playwright_version.outputs.version }}
          restore-keys: |
            ${{ runner.os }}-playwright-chromium-
      - name: Install Playwright Browsers
        if: steps.cache.outputs.cache-hit != 'true'
        run: yarn workspace @centralbeans/website playwright install --with-deps chromium
      - name: Run Playwright tests
        run: baseUrl=https://centralbeans.com yarn workspace @centralbeans/website playwright test --project chromium
      - uses: actions/upload-artifact@v7
        name: Upload Playwright report
        if: always()
        with:
          name: playwright-report
          path: packages/coffee.chealt.com/playwright-report/
          retention-days: 30
      - uses: actions/upload-artifact@v7
        name: Upload A11y report
        if: always()
        with:
          name: a11y-report
          path: packages/coffee.chealt.com/a11y-report/
          retention-days: 30
      - uses: aws-actions/configure-aws-credentials@v6
        if: always()
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}
      - name: Upload files to AWS
        id: report-upload
        if: always()
        run: |
          aws s3 sync packages/coffee.chealt.com/playwright-report/ s3://centralbeans-playwright-reports/test-reports/prod/${{ github.ref_name }}
          aws s3 sync packages/coffee.chealt.com/a11y-report/ s3://centralbeans-playwright-reports/a11y-reports/prod/${{ github.ref_name }}
      - name: Report test report upload status
        if: always()
        run: |
          curl -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
              https://api.github.com/repos/${{ github.repository }}/statuses/${{ github.sha }} \
              -d '{"context":"UI Tests - prod / report","state":"${{ steps.report-upload.outcome }}","target_url":"https://playwright-reports.centralbeans.com/test-reports/prod/${{ github.ref_name }}/index.html"}'
