name: Deploy
on:
  push:
    branches:
      - main
  # Trigger when the cron workflow completes
  workflow_run:
    workflows: ['dataExport']
    types:
      - completed
permissions:
  contents: write
  statuses: write
concurrency:
  group: deploy
jobs:
  create-user:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check changed files
        id: changed-files
        uses: tj-actions/changed-files@v47
        with:
          files: |
            yarn.lock
            .github/workflows/deploy.yml
            packages/create-user/package.json
            packages/create-user/.yarnrc-lambda.yml
            packages/create-user/src/**
      - uses: aws-actions/configure-aws-credentials@v6
        if: steps.changed-files.outputs.any_changed == 'true'
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}
      - uses: actions/setup-node@v6
        if: steps.changed-files.outputs.any_changed == 'true'
        with:
          node-version-file: 'package.json'
          cache: 'yarn'
      - name: deploy
        id: deploy
        if: steps.changed-files.outputs.any_changed == 'true'
        run: |
          yarn workspace @centralbeans/create-user build
          version=$(yarn workspace @centralbeans/create-user deploy | jq -r '.Version')
          echo "version=$version" >> $GITHUB_OUTPUT
      - name: Release create-user
        if: steps.changed-files.outputs.any_changed == 'true' && steps.deploy.conclusion == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create '@centralbeans/create-user@${{ steps.deploy.outputs.version }}' \
            --title "Release @centralbeans/create-user v${{ steps.deploy.outputs.version }}" \
            --notes "Automated release" \
            --draft=false \
            --prerelease=false
