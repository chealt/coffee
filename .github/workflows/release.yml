name: Release
on:
  schedule:
    - cron: '10 7 * * *'
permissions:
  contents: write
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v6
      - name: Install dependencies
        run: yarn install
      - name: Refresh static data
        run: yarn workspace @chealt/coffee build:scan
      - name: Commit changes
        run: |
          git config --global user.name 'Chealt GitHub automation'
          git config --global user.email 'info@centralbeans.com'
          git commit -am "Automated build"
          git push
