name = "coffee"
main = "./dist/_worker.js/index.js"
upload_source_maps = true
compatibility_date = "2025-04-08"
compatibility_flags = ["nodejs_compat"]

[assets]
binding = "ASSETS"
directory = "./dist"

[observability]
enabled = true

[vars]
CLOUDFLARE_R2_BUCKET_DOMAIN = "images.coffee.chealt.com"
CLOUDFLARE_R2_COLLECTION_FOLDER = "collection-images"
ORIGIN = "https://coffee.chealt.com"
RELYING_PARTY_ID = "coffee.chealt.com"
