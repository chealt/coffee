<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="panamaRed" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EF4444;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#DC2626;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="panamaBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1D4ED8;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Panama country shape (narrow isthmus connecting North and South America) -->
  <path d="M80 40 Q85 35 95 40 Q105 45 115 50 Q125 60 120 80 Q115 100 110 120 Q105 140 100 160 Q95 175 90 170 Q85 165 80 160 Q75 140 70 120 Q65 100 70 80 Q75 60 80 40 Z" 
        fill="#FFFFFF" 
        stroke="#E5E7EB" 
        stroke-width="2"/>
  
  <!-- Red section (top right quadrant) -->
  <path d="M95 40 Q105 45 115 50 Q125 60 120 80 Q115 90 110 100 Q105 95 100 90 Q95 85 95 80 Q95 70 95 60 Q95 50 95 40 Z" 
        fill="url(#panamaRed)" 
        opacity="0.8"/>
  
  <!-- Blue section (bottom left quadrant) -->
  <path d="M80 100 Q85 105 90 110 Q95 115 95 120 Q95 130 95 140 Q95 150 90 160 Q85 165 80 160 Q75 140 70 120 Q65 100 70 100 Q75 100 80 100 Z" 
        fill="url(#panamaBlue)" 
        opacity="0.8"/>
  
  <!-- Blue star (top left) -->
  <g transform="translate(85,70)">
    <path d="M0,-6 L1.8,-1.8 L6,-1.8 L3,0.8 L4.5,5 L0,2.5 L-4.5,5 L-3,0.8 L-6,-1.8 L-1.8,-1.8 Z" 
          fill="url(#panamaBlue)" 
          stroke="#1D4ED8" 
          stroke-width="0.3"/>
  </g>
  
  <!-- Red star (bottom right) -->
  <g transform="translate(105,130)">
    <path d="M0,-6 L1.8,-1.8 L6,-1.8 L3,0.8 L4.5,5 L0,2.5 L-4.5,5 L-3,0.8 L-6,-1.8 L-1.8,-1.8 Z" 
          fill="url(#panamaRed)" 
          stroke="#DC2626" 
          stroke-width="0.3"/>
  </g>
</svg>
