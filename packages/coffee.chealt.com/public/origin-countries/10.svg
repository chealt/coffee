  <path d="M70 50 Q90 45 110 50 Q130 55 140 70 Q145 90 140 110 Q135 130 125 145 Q115 160 100 165 Q85 170 70 165 Q55 160 45 145 Q35 130 40 110 Q45 90 50 70 Q55 55 65 50 Q68 48 70 50 Z" 
