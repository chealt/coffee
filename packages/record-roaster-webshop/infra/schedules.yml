AWSTemplateFormatVersion: '2010-09-09'
Description: Schedules for crawling roaster webshops

Parameters:
  RecordLambdaArn:
    Type: String
    Default: 'arn:aws:lambda:eu-central-1:781346609033:function:recordRoasterWebshop'
    Description: ARN of the Lambda function to trigger

Resources:
  SchedulerExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: scheduler.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: InvokeLambdaPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource:
                  - !Ref RecordLambdaArn
                  - !Sub '${RecordLambdaArn}:*'

  SheepAndRavenSchedule:
    Type: AWS::Scheduler::Schedule
    Properties:
      Name: SheepAndRavenSchedule
      ScheduleExpression: 'cron(0 0 ? * MON *)'
      Target:
        Arn: !Ref RecordLambdaArn
        RoleArn: !GetAtt SchedulerExecutionRole.Arn
        Input: '{"roasterId": 6}'

  ElCafeteroSchedule:
    Type: AWS::Scheduler::Schedule
    Properties:
      Name: ElCafeteroSchedule
      ScheduleExpression: 'cron(10 0 ? * MON *)'
      Target:
        Arn: !Ref RecordLambdaArn
        RoleArn: !GetAtt SchedulerExecutionRole.Arn
        Input: '{"roasterId": 7}'

  TypikaSchedule:
    Type: AWS::Scheduler::Schedule
    Properties:
      Name: TypikaSchedule
      ScheduleExpression: 'cron(20 0 ? * MON *)'
      Target:
        Arn: !Ref RecordLambdaArn
        RoleArn: !GetAtt SchedulerExecutionRole.Arn
        Input: '{"roasterId": 14}'

  BeMyBeanSchedule:
    Type: AWS::Scheduler::Schedule
    Properties:
      Name: BeMyBeanSchedule
      ScheduleExpression: 'cron(30 0 ? * MON *)'
      Target:
